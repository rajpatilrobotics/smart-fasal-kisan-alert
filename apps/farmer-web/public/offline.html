<!doctype html>
<html lang="mr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'"
    />
    <title>Smart Fasal — Offline</title>
    <style>
      :root {
        color: #17251b;
        background: #f4f8f2;
        font-family: system-ui, sans-serif;
      }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        padding: 1.5rem;
        box-sizing: border-box;
        place-items: center;
      }
      main {
        width: min(30rem, 100%);
        padding: 1.5rem;
        border: 1px solid #b7c9b8;
        border-radius: 1rem;
        background: #fff;
      }
      h1 {
        margin-top: 0;
        font-size: 1.5rem;
      }
      p {
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>इंटरनेट उपलब्ध नाही</h1>
      <p>जोडणी परत आल्यावर हे पान पुन्हा उघडा.</p>
      <p lang="hi">इंटरनेट वापस आने पर यह पेज फिर खोलें।</p>
      <p lang="en">
        Reconnect, then open this page again. This fallback contains no personal data.
      </p>
    </main>
  </body>
</html>
